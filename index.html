<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Post Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b1020;
      --bg2: #11182d;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.14);
      --text: #f5f7ff;
      --muted: #aeb8d0;
      --primary: #6ee7b7;
      --accent: #60a5fa;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(110, 231, 183, 0.16), transparent 30%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
      opacity: 0.45;
    }

    .orb-1 {
      top: 60px;
      left: 80px;
      background: rgba(96, 165, 250, 0.22);
    }

    .orb-2 {
      bottom: 60px;
      right: 80px;
      background: rgba(110, 231, 183, 0.20);
    }

    .app-shell {
      width: 100%;
      max-width: 900px;
      position: relative;
      z-index: 2;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 12px;
    }

    .subtitle {
      max-width: 620px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .card-header h2 {
      font-size: 1.35rem;
      font-weight: 700;
    }

    .badge {
      background: rgba(110, 231, 183, 0.14);
      color: var(--primary);
      border: 1px solid rgba(110, 231, 183, 0.25);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6ecff;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      color: white;
      font-size: 0.96rem;
      outline: none;
      transition: 0.25s ease;
    }

    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.15);
    }

    option {
      color: black;
    }

    .generate-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #08111f;
      font-size: 1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 16px 30px rgba(52, 211, 153, 0.22);
      margin-bottom: 24px;
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(52, 211, 153, 0.28);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      font-size: 1.1rem;
    }

    .output-wrap {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
    }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .output-header h3 {
      font-size: 1rem;
      font-weight: 700;
    }

    .output-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .output-status {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      background: rgba(110, 231, 183, 0.12);
      padding: 6px 10px;
      border-radius: 999px;
    }

    .copy-btn {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.22s ease;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.14);
      transform: translateY(-1px);
    }

    .copy-btn:active {
      transform: translateY(0);
    }

    .copy-btn.copied {
      background: rgba(110, 231, 183, 0.14);
      color: var(--primary);
      border-color: rgba(110, 231, 183, 0.24);
    }

    #output {
      min-height: 180px;
      white-space: pre-wrap;
      line-height: 1.8;
      color: #edf2ff;
      background: rgba(7, 12, 24, 0.45);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 18px;
    }

    @media (max-width: 768px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }

      .hero {
        margin-bottom: 20px;
      }

      .hero h1 {
        font-size: 2.2rem;
      }

      #output {
        min-height: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">AI Writing Studio</p>
      <h1>🔗 LinkedIn Post Generator</h1>
      <p class="subtitle">
        Create polished LinkedIn posts in seconds with the right topic, length, and language.
      </p>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Generate your post</h2>
        <span class="badge">Smart Drafting</span>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="topic">Topic</label>
          <select id="topic">
            <option>Artificial Intelligence</option>
            <option>Machine Learning</option>
            <option>Career Growth</option>
            <option>Startups</option>
            <option>Productivity</option>
            <option>Software Development</option>
          </select>
        </div>

        <div class="form-group">
          <label for="length">Length</label>
          <select id="length">
            <option>Short</option>
            <option>Medium</option>
            <option>Long</option>
          </select>
        </div>

        <div class="form-group">
          <label for="language">Language</label>
          <select id="language">
            <option>English</option>
            <option>Hinglish</option>
          </select>
        </div>
      </div>

      <button class="generate-btn" onclick="generatePost()" type="button">
        <span>Generate Post</span>
        <span class="btn-icon">🚀</span>
      </button>

      <div class="output-wrap">
        <div class="output-header">
          <h3>Generated Output</h3>

          <div class="output-actions">
            <span class="output-status">Ready</span>
            <button
              id="copyBtn"
              class="copy-btn"
              type="button"
              onclick="copyPost()"
              aria-label="Copy generated post"
            >
              Copy
            </button>
          </div>
        </div>

        <div id="output">Your generated post will appear here...</div>
      </div>
    </section>
  </main>

  <script>
    async function generatePost() {
      const topic = document.getElementById("topic").value;
      const length = document.getElementById("length").value;
      const language = document.getElementById("language").value;
      const output = document.getElementById("output");
      const status = document.querySelector(".output-status");
      const copyBtn = document.getElementById("copyBtn");

      output.innerText = "Generating... ⏳";
      status.innerText = "Generating";
      copyBtn.innerText = "Copy";
      copyBtn.classList.remove("copied");

      try {
        const response = await fetch("http://127.0.0.1:8000/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            topic: topic,
            length: length,
            language: language
          })
        });

        const data = await response.json();

        if (data.post) {
          output.innerText = data.post;
          status.innerText = "Done";
        } else {
          output.innerText = "Error: " + data.error;
          status.innerText = "Error";
        }
      } catch (error) {
        output.innerText = "Connection error ❌";
        status.innerText = "Offline";
        console.error(error);
      }
    }

    async function copyPost() {
      const output = document.getElementById("output");
      const copyBtn = document.getElementById("copyBtn");
      const text = output.innerText.trim();

      if (
        !text ||
        text === "Your generated post will appear here..." ||
        text === "Generating... ⏳"
      ) {
        copyBtn.innerText = "Nothing to copy";
        setTimeout(() => {
          copyBtn.innerText = "Copy";
        }, 1500);
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        copyBtn.innerText = "Copied!";
        copyBtn.classList.add("copied");
      } catch (err) {
        const tempTextArea = document.createElement("textarea");
        tempTextArea.value = text;
        document.body.appendChild(tempTextArea);
        tempTextArea.select();
        document.execCommand("copy");
        document.body.removeChild(tempTextArea);

        copyBtn.innerText = "Copied!";
        copyBtn.classList.add("copied");
      }

      setTimeout(() => {
        copyBtn.innerText = "Copy";
        copyBtn.classList.remove("copied");
      }, 1600);
    }
  </script>
</body>
</html>
